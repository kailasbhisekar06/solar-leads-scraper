<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KB Global | AI-Driven Global Lead Generation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* आपकी फोटो से प्रेरित नियॉन ग्लो */
        .neon-glow {
            box-shadow: 0 0 35px rgba(34, 197, 94, 0.95);
        }
        .glass-card {
            background: rgba(17, 24, 39, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* 3D ग्लोब कंटेनर */
        #globe-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased overflow-x-hidden">

    <section class="relative min-h-screen flex flex-col items-center justify-center pt-20 pb-32">
        <div id="globe-container"></div>
        
        <div class="relative max-w-5xl mx-auto px-6 text-center z-10 mb-16">
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-emerald-500/20 border border-emerald-500/30 text-emerald-400 text-sm font-bold mb-8 shadow-[0_0_20px_rgba(16,185,129,0.5)]">
                <span class="w-2.5 h-2.5 rounded-full bg-emerald-400 animate-pulse"></span>
                Global Data Engine: ONLINE
            </div>
            
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight text-white mb-6 drop-shadow-lg">
                Scale Your Business Globally With High-Converting Leads
            </h1>
            
            <p class="text-lg md:text-xl text-slate-300 max-w-3xl mx-auto mb-12 leading-relaxed drop-shadow">
                Flood Your Pipelines with 100% Verified Home-Owner & Corporate Data across the US, UK, Canada, Europe, UAE, and Japan.
            </p>
            
            <a href="#lead-form" class="inline-block bg-emerald-500 text-white font-extrabold text-xl px-10 py-5 rounded-lg transition-all neon-glow transform hover:scale-105 duration-200">
                GET 10 FREE SAMPLE LEADS
            </a>
        </div>

        <div class="w-full max-w-5xl mx-auto px-6 relative z-20 -mt-10">
            <div class="bg-white rounded-xl p-8 shadow-2xl border border-slate-200 text-slate-900">
                <h2 class="text-sm font-bold tracking-widest text-slate-500 uppercase text-center mb-8 border-b pb-4">Our Global Reach</h2>
                <div class="grid grid-cols-3 md:grid-cols-6 gap-6 text-center items-center">
                    <div class="flex flex-col items-center gap-2"><img src="https://flagcdn.com/w80/us.png" alt="USA" class="w-12 h-auto shadow-sm rounded"> <span class="font-bold">USA</span></div>
                    <div class="flex flex-col items-center gap-2"><img src="https://flagcdn.com/w80/gb.png" alt="UK" class="w-12 h-auto shadow-sm rounded"> <span class="font-bold">UK</span></div>
                    <div class="flex flex-col items-center gap-2"><img src="https://flagcdn.com/w80/ca.png" alt="Canada" class="w-12 h-auto shadow-sm rounded"> <span class="font-bold">Canada</span></div>
                    <div class="flex flex-col items-center gap-2"><img src="https://flagcdn.com/w80/eu.png" alt="Europe" class="w-12 h-auto shadow-sm rounded"> <span class="font-bold">Europe</span></div>
                    <div class="flex flex-col items-center gap-2"><img src="https://flagcdn.com/w80/ae.png" alt="UAE" class="w-12 h-auto shadow-sm rounded"> <span class="font-bold">UAE</span></div>
                    <div class="flex flex-col items-center gap-2"><img src="https://flagcdn.com/w80/jp.png" alt="Japan" class="w-12 h-auto shadow-sm rounded"> <span class="font-bold">Japan</span></div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three-globe"></script>

    <script>
        // ... (पुराना 3D ग्लोब स्क्रिप्ट हटाकर इसे पेस्ट करें) ...
        
        const container = document.getElementById('globe-container');
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.z = 3.5;

        // आपकी फोटो से प्रेरित नियॉन ग्रीन और इलेक्ट्रिक ब्लू कलर्स
        const neonGreen = 0x10b981;
        const electricBlue = 0x00ffff;

        const Globe = new ThreeGlobe()
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
            .pointAltitude(0.1)
            .pointColor(() => `rgba(16, 185, 129, 1)`) // Points are Neon Green
            .arcColor(() => `rgba(0, 255, 255, 0.8)`) // Arcs are Electric Blue
            .arcAltitude(0.2)
            .arcStroke(0.1)
            .arcsData([]) // We'll add data later
            .pointsData([]); // We'll add data later

        // Add glow effect
        Globe.mesh.material.emissive = new THREE.Color(neonGreen);
        Globe.mesh.material.emissiveIntensity = 0.5;

        scene.add(Globe);

        // Add lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);

        // Add network data (arcs and points)
        // ... (यहाँ आपको अपना वास्तविक नेटवर्क डेटा डालना होगा) ...

        function animate() {
            requestAnimationFrame(animate);
            Globe.rotation.y += 0.003; // Rotate the globe
            renderer.render(scene, camera);
        }
        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>

</body>
</html>
