<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KB Global | AI-Driven Global Lead Generation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .neon-glow {
            box-shadow: 0 0 35px rgba(34, 197, 94, 0.95);
        }
        .glass-card {
            background: rgba(17, 24, 39, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #globe-fixed-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }
        .content-layer {
            position: relative;
            z-index: 10;
        }
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased overflow-x-hidden">

    <section class="relative min-h-screen flex flex-col items-center justify-center pt-20 pb-32">
        <div id="globe-fixed-bg"></div>
        <div class="content-layer max-w-5xl mx-auto px-6 text-center mb-16">
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-emerald-500/20 border border-emerald-500/30 text-emerald-400 text-sm font-bold mb-8 shadow-[0_0_20px_rgba(16,185,129,0.5)]">
                <span class="w-2.5 h-2.5 rounded-full bg-emerald-400 animate-pulse"></span>
                Global Data Engine: ONLINE
            </div>
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight text-white mb-6 drop-shadow-xl">
                Scale Your Business Globally With High-Converting Leads
            </h1>
            <p class="text-lg md:text-xl text-slate-300 max-w-3xl mx-auto mb-12 leading-relaxed drop-shadow-md">
                Flood Your Pipelines with 100% Verified Home-Owner & Corporate Data across the US, UK, Canada, Europe, UAE, and Japan.
            </p>
            <a href="#lead-form" class="inline-block bg-emerald-500 text-slate-900 font-extrabold text-xl px-10 py-5 rounded-lg transition-all neon-glow transform hover:scale-105 duration-200">
                GET 10 FREE SAMPLE LEADS
            </a>
        </div>
    </section>

    <section id="lead-form" class="py-24 bg-slate-950 relative overflow-hidden z-10">
        <div class="max-w-xl mx-auto px-6 relative z-10">
            <div class="text-center mb-10">
                <h2 class="text-4xl font-extrabold mb-4 text-white">Claim Your 10 Free Leads</h2>
                <p class="text-slate-400 text-lg">Enter your business details below.</p>
            </div>
            
            <form id="my-lead-form" class="glass-card p-8 md:p-10 rounded-3xl space-y-6 shadow-2xl border border-slate-700">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-emerald-400 mb-2">Full Name</label>
                    <input type="text" name="name" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-5 py-4 text-slate-100 focus:outline-none focus:border-emerald-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-emerald-400 mb-2">Business Email</label>
                    <input type="email" name="email" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-5 py-4 text-slate-100 focus:outline-none focus:border-emerald-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-emerald-400 mb-2">Your Industry</label>
                    <select name="industry" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-5 py-4 text-slate-100 focus:outline-none focus:border-emerald-500 transition-colors appearance-none">
                        <option value="Solar Energy Providers">Solar Energy Providers</option>
                        <option value="Real Estate Brokers">Real Estate Brokers</option>
                        <option value="B2B / SaaS Software">B2B / SaaS Software</option>
                        <option value="Other High-Ticket Business">Other High-Ticket Business</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-emerald-400 mb-2">Target Country</label>
                    <input type="text" name="target_location" placeholder="e.g. USA, UK, UAE" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-5 py-4 text-slate-100 focus:outline-none focus:border-emerald-500 transition-colors">
                </div>
                
                <button type="submit" id="submit-btn" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-extrabold text-lg py-5 rounded-xl transition-all neon-glow mt-6">
                    SUBMIT & GENERATE SAMPLE
                </button>
            </form>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        document.getElementById('my-lead-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            btn.innerText = 'PROCESSING...';
            btn.disabled = true;

            const formData = new FormData(this);
            
            const rawData = {
                name: formData.get('name'),
                email: formData.get('email'),
                industry: formData.get('industry'),
                target_location: formData.get('target_location')
            };

            try {
                // यहाँ ध्यान से देखो भाई - 'webhook-test' हटाकर असली 'webhook' (Production URL) डाल दिया है
                const response = await fetch('https://n8n.thekbglobal.com/webhook/kb-global-website-leads', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(rawData)
                });

                if (response.ok) {
                    btn.innerText = 'SUCCESS! THANK YOU';
                    btn.style.backgroundColor = '#10b981';
                    this.reset();
                } else {
                    btn.innerText = 'ERROR! TRY AGAIN';
                    btn.style.backgroundColor = '#ef4444';
                    btn.disabled = false;
                }
            } catch (error) {
                btn.innerText = 'ERROR! TRY AGAIN';
                btn.style.backgroundColor = '#ef4444';
                btn.disabled = false;
            }
        });

        // ग्लोब एलीमेंट का एनीमेशन कोड
        const container = document.getElementById('globe-fixed-bg');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 3.2;
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);
        const globeRadius = 2.2;
        const geometry = new THREE.SphereGeometry(globeRadius, 40, 40);
        const material = new THREE.MeshBasicMaterial({ color: 0x022c22, wireframe: true, transparent: true, opacity: 0.15 });
        const globe = new THREE.Mesh(geometry, material);
        scene.add(globe);

        function fn_animate() {
            requestAnimationFrame(fn_animate);
            globe.rotation.y += 0.0025;
            renderer.render(scene, camera);
        }
        fn_animate();
    </script>
</body>
</html>
